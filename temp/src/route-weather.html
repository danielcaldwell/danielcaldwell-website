<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Weather Query</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        #search-container {
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        hr {
            margin: 20px 0;
        }
        .location-list {
            list-style-type: none;
            padding: 0;
        }
        .location-item {
            background-color: #f0f0f0;
            border-radius: 10px;
            padding: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .weather-box {
            border-radius: 10px;
            padding: 10px;
            margin: 5px 0;
        }
        .current-weather {
            background-color: lightgreen;
        }
        .daily-forecast {
            background-color: lightyellow;
        }
        .weekly-forecast {
            background-color: lightcoral;
        }
        .selected-locations {
            margin-top: 20px;
        }
        .selected-location {
            background-color: #e0e0e0;
            border-radius: 10px;
            padding: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .remove-location {
            cursor: pointer;
            color: red;
        }
    </style>
</head>
<body>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Enter city, state or zip code">
    </div>
    <hr>
    <ul id="location-list" class="location-list"></ul>
    <div class="selected-locations" id="selected-locations"></div>
    <button id="query-all-button">Query All Locations Weather</button>

    <script>
        const searchInput = document.getElementById('search-input');
        const locationList = document.getElementById('location-list');
        const selectedLocationsDiv = document.getElementById('selected-locations');
        const queryAllButton = document.getElementById('query-all-button');

        let selectedLocations = [];

        function displayLocationSuggestions(locations) {
            locationList.innerHTML = '';
            locations.forEach(location => {
                const listItem = document.createElement('li');
                listItem.className = 'location-item';
                listItem.innerHTML = `
                    <div>
                        <strong>${location.Type}</strong><br>
                        ${location.Name}, ${location.State}, ${location.County}<br>
                        Lat: ${location.Latitude}, Lon: ${location.Longitude}
                    </div>
                    <button onclick="selectLocation(${JSON.stringify(location).replace(/"/g, '&quot;')})">Select</button>
                `;
                locationList.appendChild(listItem);
            });
        }

        function selectLocation(location) {
            selectedLocations.push(location);
            updateSelectedLocations();
            locationList.innerHTML = ''; // Clear suggestions
        }

        function updateSelectedLocations() {
            selectedLocationsDiv.innerHTML = '';
            selectedLocations.forEach((location, index) => {
                const locationDiv = document.createElement('div');
                locationDiv.className = 'selected-location';
                locationDiv.innerHTML = `
                    <div>
                        <strong>${location.Type}</strong><br>
                        ${location.Name}, ${location.State}, ${location.County}<br>
                        Lat: ${location.Latitude}, Lon: ${location.Longitude}
                    </div>
                    <div class="remove-location" onclick="removeLocation(${index})">🗑️</div>
                    <button onclick="queryWeather(${location.Latitude}, ${location.Longitude})">Query Weather</button>
                `;
                selectedLocationsDiv.appendChild(locationDiv);
            });
        }

        function removeLocation(index) {
            selectedLocations.splice(index, 1);
            updateSelectedLocations();
        }

        async function queryWeather(latitude, longitude) {
            const response = await fetch(`https://api.weather.gov/points/${latitude},${longitude}`);
            const weatherData = await response.json();
            
            // Fetch the forecast data using the forecast URL from the first response
            const forecastResponse = await fetch(weatherData.properties.forecast);
            const forecastData = await forecastResponse.json();
            
            displayWeather(forecastData, latitude, longitude);
        }

        function displayWeather(forecastData, latitude, longitude) {
            // Create a container for the location and its weather
            const locationWeatherDiv = document.createElement('div');
            locationWeatherDiv.className = 'location-weather-container';
            locationWeatherDiv.style.borderRadius = '10px'; // Optional: Add rounded corners
            locationWeatherDiv.style.padding = '10px'; // Optional: Add padding
            locationWeatherDiv.style.margin = '10px 0'; // Optional: Add margin
            locationWeatherDiv.style.backgroundColor = '#f9f9f9'; // Optional: Background color

            // Add location information
            const locationInfo = document.createElement('div');
            locationInfo.innerHTML = `
                <strong>Location:</strong><br>
                Latitude: ${latitude}, Longitude: ${longitude}
            `;
            locationWeatherDiv.appendChild(locationInfo);

            // Get the current weather
            const currentWeather = forecastData.properties.periods[0];
            const weatherDiv = document.createElement('div');
            weatherDiv.className = 'weather-box current-weather';
            weatherDiv.innerHTML = `
                <strong>Current Weather:</strong><br>
                ${currentWeather.shortForecast}<br>
                Temperature: ${currentWeather.temperature}°F
            `;
            locationWeatherDiv.appendChild(weatherDiv);

            // Add daily forecast
            forecastData.properties.periods.slice(1, 6).forEach(forecast => {
                const forecastDiv = document.createElement('div');
                forecastDiv.className = 'weather-box daily-forecast';
                forecastDiv.innerHTML = `
                    <strong>${forecast.name}:</strong><br>
                    ${forecast.shortForecast}<br>
                    Temperature: ${forecast.temperature}°F
                `;
                locationWeatherDiv.appendChild(forecastDiv);
            });

            // Append the location weather container to the selected locations div
            selectedLocationsDiv.appendChild(locationWeatherDiv);
        }

        queryAllButton.addEventListener('click', async () => {
            for (const location of selectedLocations) {
                await queryWeather(location.Latitude, location.Longitude);
            }
        });

        // Add event listener for keydown on the search input
        searchInput.addEventListener('keydown', async (event) => {
          
            const term = searchInput.value;
            if (term) {
                url = `https://dashboard.waterdata.usgs.gov/service/geocoder/get/location/1.0?include=gnis%2Cpostal%2Cstate&maxSuggestions=10&term=${encodeURIComponent(term)}`;
                console.log("Fetching URL: \n " + url)
                const response = await fetch(`https://dashboard.waterdata.usgs.gov/service/geocoder/get/location/1.0?include=gnis%2Cpostal%2Cstate&maxSuggestions=10&term=${encodeURIComponent(term)}`);
                const locations = await response.json();
                displayLocationSuggestions(locations);
            }
        
        });
    </script>
</body>
</html>
