<!DOCTYPE html>
<html lang="en">
<head>
<title>Page not found</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
* {margin: 0; padding: 0;}
body {background: black;}
canvas {display: block; width: 100vw; height: 100vh;}
</style>

<!-- adapted from here: http://thecodeplayer.com/experiment/matrix-rain-animation-html5-canvas-javascript -->

</head>
<body>
<canvas id="c"></canvas>



<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

// chinese characters - taken from the unicode charset
const chinese = "田由甲申甴电甶男甸甹町画甼甽甾甿畀畁畂畃畄畅畆畇畈畉畊畋界畍畎畏畐畑ムタ二コク1234567890シモラキリエスハヌトユABCDEFabcdefghijklmnopqrstuvwxyzGHIJKLMNOPQRSTUVWXYZ".split("");

const name = "DANIEL";

// Character size in CSS pixels (fixed on all screen sizes)
const CELL_SIZE = 12;
let layoutWidth = 0;
let layoutHeight = 0;
let columns = 0;
let drops = [];
let foundName = false;
let nameIdx = 0;
let nameDrop = 0;

function initDrops() {
	drops = [];
	const rows = Math.ceil(layoutHeight / CELL_SIZE) + 1;
	for (let x = 0; x < columns; x++) {
		drops[x] = Math.floor(Math.random() * rows);
	}
}

function resizeCanvas() {
	layoutWidth = document.documentElement.clientWidth;
	layoutHeight = document.documentElement.clientHeight;

	const dpr = window.devicePixelRatio || 1;
	columns = Math.floor(layoutWidth / CELL_SIZE);

	// Setting width/height resets the context (transform, font, etc.)
	c.width = Math.floor(layoutWidth * dpr);
	c.height = Math.floor(layoutHeight * dpr);
	ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

	initDrops();
	foundName = false;
	nameIdx = 0;
}

function setDrawFont() {
	// Must run after resize (canvas dimension reset clears font) and each frame is safest
	ctx.font = "bold " + CELL_SIZE + "px monospace";
	ctx.textBaseline = "top";
}

resizeCanvas();

let resizeTimer;
window.addEventListener("resize", () => {
	clearTimeout(resizeTimer);
	resizeTimer = setTimeout(resizeCanvas, 100);
});

//drawing the characters
function draw()
{
	setDrawFont();

	// translucent BG to show trail (use layout size in CSS pixel space)
	ctx.fillStyle = "rgba(0, 0, 0, 0.04)";
	ctx.fillRect(0, 0, layoutWidth, layoutHeight);

	for (let i = 0; i < columns; i++)
	{
		ctx.fillStyle = "#4169e1";

		if (!foundName && Math.floor(Math.random() * 100) === 1) {
			foundName = true;
			nameIdx = 0;
			nameDrop = i;
		}

		let text = chinese[Math.floor(Math.random() * chinese.length)];

		if (foundName && i === nameDrop) {
			if (nameIdx <= name.length - 1) {
				ctx.fillStyle = "#7798fc";
				text = name[nameIdx];
				nameIdx++;
			} else {
				foundName = false;
				nameIdx = 0;
			}
		}

		const x = i * CELL_SIZE;
		const y = drops[i] * CELL_SIZE;
		ctx.fillText(text, x, y);

		if (y > layoutHeight && Math.random() > 0.975) {
			drops[i] = 0;
		}

		drops[i]++;
	}
}

setInterval(draw, 70);
</script>


</body>
</html>
