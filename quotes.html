<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quotes — Daniel Caldwell</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="site.css" rel="stylesheet" type="text/css">
</head>
<body>
    <script type="text/javascript" src="quotelist.js"></script>
    <div class="container">
        <nav class="breadcrumb"><a href="index.html">← Home</a></nav>
        <div class="quote-list" id="quote-list"></div>
    </div>
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        const list = document.getElementById('quote-list');
        quotes.forEach(q => {
            const card = document.createElement('div');
            card.className = 'quote-display';

            const text = document.createElement('div');
            text.className = 'quote-text';
            text.innerText = '“' + q.quote + '”';

            const attr = document.createElement('div');
            attr.className = 'quote-attribution';
            attr.innerText = '— ' + q.author;

            card.appendChild(text);
            card.appendChild(attr);
            list.appendChild(card);
        });
    </script>
</body>
</html>
