<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quotes — Daniel Caldwell</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="site.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <script type="text/javascript" src="quotelist.js"></script>
    <div class="site-nav">
        <div class="settings-bar">
            <button id="settingsButton" class="settings-button" aria-label="Menu"><i class="fas fa-bars"></i></button>
            <div id="settingsMenu" class="settings-menu hidden">
                <div class="settings-option">
                    <label for="darkModeToggle">Dark Mode</label>
                    <label class="switch"><input type="checkbox" id="darkModeToggle"><span class="slider round"></span></label>
                </div>
            </div>
        </div>
        <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="index.html">Home</a>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-current">Quotes</span>
        </nav>
    </div>

    <div class="container">
        <div class="quote-list" id="quote-list"></div>
    </div>
    <script>
        const list = document.getElementById('quote-list');
        quotes.forEach(q => {
            const card = document.createElement('div');
            card.className = 'quote-display';

            const { text: quoteText, author } = formatQuote(q);

            const text = document.createElement('div');
            text.className = 'quote-text';
            text.innerText = quoteText;

            const attr = document.createElement('div');
            attr.className = 'quote-attribution';
            attr.innerText = '— ' + author;

            card.appendChild(text);
            card.appendChild(attr);
            list.appendChild(card);
        });
    </script>
    <script src="nav.js"></script>
</body>
</html>
