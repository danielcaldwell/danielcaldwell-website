<!DOCTYPE html>
<html lang="en">

<head>
	<title>Images — Daniel Caldwell</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="site.css" rel="stylesheet" type="text/css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

	<script>
		const savedTheme = localStorage.getItem('theme');
		if (savedTheme) {
			document.documentElement.setAttribute('data-theme', savedTheme);
		} else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
			document.documentElement.setAttribute('data-theme', 'dark');
		}
	</script>

	<div class="site-nav">
		<div class="settings-bar">
			<button id="settingsButton" class="settings-button" aria-label="Menu"><i class="fas fa-bars"></i></button>
			<div id="settingsMenu" class="settings-menu hidden">
				<div class="settings-option">
					<label for="darkModeToggle">Dark Mode</label>
					<label class="switch"><input type="checkbox" id="darkModeToggle"><span class="slider round"></span></label>
				</div>
				<hr class="settings-divider">
				<div class="settings-option">
					<a href="https://danielcaldwell.bearblog.dev/blog/" target="_blank" rel="noopener">Blog</a>
				</div>
				<div class="settings-option">
					<a href="https://www.linkedin.com/in/danielcaldwell/" target="_blank" rel="noopener">LinkedIn</a>
				</div>
				<div class="settings-option">
					<a href="https://bsky.app/profile/danielcaldwell.bsky.social" target="_blank" rel="noopener">Bluesky</a>
				</div>
			</div>
		</div>
		<nav class="breadcrumb" aria-label="Breadcrumb">
			<a href="index.html">Home</a>
			<span class="breadcrumb-sep">/</span>
			<span class="breadcrumb-current">Images</span>
		</nav>
	</div>

	<div class="container">
		<script type="text/javascript" src="imagelist.js"></script>
		<script>

			// This code was created by me, Daniel Caldwell, and it is availiable to the public domain.

			const PAGE_SIZE = 20;

			const container = document.querySelector('.container');

			const totalPages = Math.max(1, Math.ceil(images.length / PAGE_SIZE));
			const requestedPage = Number.parseInt(new URLSearchParams(window.location.search).get('page'), 10);
			const currentPage = Number.isNaN(requestedPage) ? 1 : Math.min(Math.max(requestedPage, 1), totalPages);

			const pageHref = (page) => page === 1 ? 'images.html' : `images.html?page=${page}`;

			const createPager = () => {
				const pager = document.createElement('nav');
				pager.className = 'pager';
				pager.setAttribute('aria-label', 'Image pages');

				const addItem = (label, page, { disabled = false, current = false } = {}) => {
					if (disabled || current) {
						const item = document.createElement('span');
						item.className = current ? 'pager-item pager-current' : 'pager-item pager-disabled';
						item.textContent = label;
						if (current) {
							item.setAttribute('aria-current', 'page');
						}
						pager.appendChild(item);
						return;
					}

					const link = document.createElement('a');
					link.className = 'pager-item';
					link.href = pageHref(page);
					link.textContent = label;
					pager.appendChild(link);
				};

				addItem('‹ Prev', currentPage - 1, { disabled: currentPage === 1 });
				for (let page = 1; page <= totalPages; page++) {
					addItem(String(page), page, { current: page === currentPage });
				}
				addItem('Next ›', currentPage + 1, { disabled: currentPage === totalPages });

				return pager;
			};

			container.appendChild(createPager());

			const pageImages = images.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
			for (const img of pageImages) {
				const wrapper = document.createElement('div');
				wrapper.className = 'artwork-container';

				const imgEl = document.createElement('img');
				imgEl.src = img.url;
				imgEl.alt = img.title;
				imgEl.className = 'artwork-display';
				wrapper.appendChild(imgEl);

				const label = document.createElement('div');
				label.className = 'artwork-label';

				const title = document.createElement('div');
				title.className = 'artwork-title';
				title.textContent = img.title;
				label.appendChild(title);

				if (img.date) {
					const date = document.createElement('div');
					date.className = 'artwork-date';
					date.textContent = img.date;
					label.appendChild(date);
				}

				const author = document.createElement('div');
				author.className = 'artwork-author';
				author.textContent = img.author;
				label.appendChild(author);

				const medium = document.createElement('div');
				medium.className = 'artwork-medium';
				medium.textContent = img.medium;
				label.appendChild(medium);

				if (img.description) {
					const desc = document.createElement('div');
					desc.className = 'artwork-description';
					desc.textContent = img.description;
					label.appendChild(desc);
				}

				wrapper.appendChild(label);

				const separator = document.createElement('div');
				separator.className = 'artwork-separator';
				wrapper.appendChild(separator);

				container.appendChild(wrapper);
			}

			container.appendChild(createPager());

		</script>

	</div>

	<script src="nav.js"></script>

</body>

</html>
