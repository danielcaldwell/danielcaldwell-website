<!DOCTYPE html>
<html lang="en">

<head>
	<title>Images — Daniel Caldwell</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="site.css" rel="stylesheet" type="text/css">
</head>

<body>

	<script>
		const savedTheme = localStorage.getItem('theme');
		if (savedTheme) {
			document.documentElement.setAttribute('data-theme', savedTheme);
		} else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
			document.documentElement.setAttribute('data-theme', 'dark');
		}
	</script>

	<div class="container">
		<nav class="breadcrumb"><a href="index.html">← Home</a></nav>

		<script type="text/javascript" src="imagelist.js"></script>
		<script>

			// This code was created by me, Daniel Caldwell, and it is availiable to the public domain.

			var container = document.querySelector('.container');
			for (var i = 0; i < images.length; i++) {
				var img = images[i];

				var wrapper = document.createElement('div');
				wrapper.className = 'artwork-container';

				var imgEl = document.createElement('img');
				imgEl.src = img.url;
				imgEl.alt = img.title;
				imgEl.className = 'artwork-display';
				wrapper.appendChild(imgEl);

				var label = document.createElement('div');
				label.className = 'artwork-label';

				var title = document.createElement('div');
				title.className = 'artwork-title';
				title.textContent = img.title;
				label.appendChild(title);

				if (img.date) {
					var date = document.createElement('div');
					date.className = 'artwork-date';
					date.textContent = img.date;
					label.appendChild(date);
				}

				var author = document.createElement('div');
				author.className = 'artwork-author';
				author.textContent = img.author;
				label.appendChild(author);

				var medium = document.createElement('div');
				medium.className = 'artwork-medium';
				medium.textContent = img.medium;
				label.appendChild(medium);

				if (img.description) {
					var desc = document.createElement('div');
					desc.className = 'artwork-description';
					desc.textContent = img.description;
					label.appendChild(desc);
				}

				wrapper.appendChild(label);

				var separator = document.createElement('div');
				separator.className = 'artwork-separator';
				wrapper.appendChild(separator);

				container.appendChild(wrapper);
			}

		</script>

	</div>

</body>

</html>
