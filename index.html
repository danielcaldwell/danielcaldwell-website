<!DOCTYPE html>
<html lang="en">

<head>
	<title>Daniel Caldwell's Website</title>
	
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- favicon-->
	<link rel="icon" href="favicon.ico" type="image/x-icon">

	<!-- styles -->
	<link href="site.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<script>
		const savedTheme = localStorage.getItem('theme');
		if (savedTheme) {
			document.documentElement.setAttribute('data-theme', savedTheme);
		} else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
			document.documentElement.setAttribute('data-theme', 'dark');
		}
	</script>

</head>

<body>

	<script type="text/javascript" src="imagelist.js"></script>
	<script type="text/javascript" src="quotelist.js"></script>

    <div class="container">


		<div class="site-nav">
		<div class="settings-bar">
			<button id="settingsButton" class="settings-button" aria-label="Menu">
				<i class="fas fa-bars"></i>
			</button>
			<div id="settingsMenu" class="settings-menu hidden">
				<div class="settings-option">
					<label for="darkModeToggle">Dark Mode</label>
					<label class="switch">
						<input type="checkbox" id="darkModeToggle">
						<span class="slider round"></span>
					</label>
				</div>
				<hr class="settings-divider">
				<div class="settings-option">
					<a href="images.html">All Images</a>
				</div>
				<div class="settings-option">
					<a href="quotes.html">All Quotes</a>
				</div>
				<hr class="settings-divider">
				<div class="settings-option">
					<a href="tools.html">Tools</a>
				</div>
				<hr class="settings-divider">
				<div class="settings-option">
					<a href="https://danielcaldwell.bearblog.dev/blog/" target="_blank" rel="noopener">Blog</a>
				</div>
				<div class="settings-option">
					<a href="https://www.linkedin.com/in/danielcaldwell/" target="_blank" rel="noopener">LinkedIn</a>
				</div>
				<div class="settings-option">
					<a href="https://bsky.app/profile/danielcaldwell.bsky.social" target="_blank" rel="noopener">Bluesky</a>
				</div>
				<hr class="settings-divider">
				<div class="settings-option">
					<label for="slideshowToggle">Slideshow</label>
					<label class="switch">
						<input type="checkbox" id="slideshowToggle" checked>
						<span class="slider round"></span>
					</label>
				</div>
				<div class="progress-bar-track">
					<div id="progress-bar-fill" class="progress-bar-fill"></div>
				</div>
			</div>
		</div>
		</div>

		<div id="artwork-container" class="artwork-container hidden">
			<div class="artwork-image-group">
				<img alt="" id="artwork" class="artwork-display">
				<div class="artwork-label">
					<div id="artwork-title" class="artwork-title"></div>
					<div id="artwork-date" class="artwork-date"></div>
					<div id="artwork-author" class="artwork-author"></div>
					<div id="artwork-medium" class="artwork-medium"></div>
					<div id="artwork-description" class="artwork-description"></div>
					<button class="share-btn" id="artwork-share-btn" title="Copy link" aria-label="Copy link"><i class="fas fa-link"></i></button>
				</div>
			</div>
			<div id="quote-display" class="quote-display">
				<div id="quote-text" class="quote-text"></div>
				<div id="quote-attribution" class="quote-attribution"></div>
				<button class="share-btn" id="quote-share-btn" title="Copy link" aria-label="Copy link"><i class="fas fa-link"></i></button>
			</div>
		</div>


	</div>

	<div id="copy-notification" class="copy-notification" aria-live="polite">Link copied!</div>

	<script>

		// This code was created by me, Daniel Caldwell, and it is availiable to the public domain.

		let intervalID = 0;
		let refreshTimeoutID = 0;
		let currentQuote = null;

		// Deals from a shuffled deck so nothing repeats until the whole list has been shown
		class ShuffleBag {
			constructor(items) {
				this.items = items;
				this.deck = [];
				this.lastDealt = null;
			}

			refill() {
				this.deck = [...this.items];
				for (let i = this.deck.length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					[this.deck[i], this.deck[j]] = [this.deck[j], this.deck[i]];
				}
				// avoid an immediate repeat across the deck boundary
				const top = this.deck.length - 1;
				if (top > 0 && this.deck[top] === this.lastDealt) {
					[this.deck[0], this.deck[top]] = [this.deck[top], this.deck[0]];
				}
			}

			draw() {
				if (this.deck.length === 0) this.refill();
				this.lastDealt = this.deck.pop();
				return this.lastDealt;
			}

			// Remove a specific item from the current deck (used for deep links)
			take(item) {
				if (this.deck.length === 0) this.refill();
				const idx = this.deck.indexOf(item);
				if (idx !== -1) this.deck.splice(idx, 1);
				this.lastDealt = item;
			}
		}

		const imageBag = new ShuffleBag(images);
		const quoteBag = new ShuffleBag(quotes);

		function ranImage() {
			return imageBag.draw();
		}

		function ranQuote() {
			return quoteBag.draw();
		}

		function applyArtwork(artwork) {
			currentQuote = null;
			const container = document.getElementById('artwork-container');
			container.classList.remove('showing-quote');
			container.classList.remove('hidden');
			history.replaceState(null, '', '#' + artwork.id);
			document.getElementById('artwork').src = artwork.url;
			document.getElementById('artwork').alt = artwork.title;
			document.getElementById('artwork-title').innerText = artwork.title;
			document.getElementById('artwork-author').innerText = artwork.author;
			document.getElementById('artwork-medium').innerText = artwork.medium;

			const dateElement = document.getElementById('artwork-date');
			dateElement.innerText = artwork.date || '';
			dateElement.style.display = artwork.date ? '' : 'none';

			const descElement = document.getElementById('artwork-description');
			descElement.innerText = artwork.description || '';
			descElement.style.display = artwork.description ? '' : 'none';
		}

		function applyQuote(quote) {
			currentQuote = quote;
			const container = document.getElementById('artwork-container');
			container.classList.add('showing-quote');
			container.classList.remove('hidden');
			history.replaceState(null, '', '#' + quote.id);
			const { text: quoteText, author } = formatQuote(quote);
			const textEl = document.getElementById('quote-text');
			const attrEl = document.getElementById('quote-attribution');
			const display = document.getElementById('quote-display');

			// Reset any inline sizes from the previous quote
			textEl.style.fontSize = '';
			attrEl.style.fontSize = '';

			textEl.innerText = quoteText;
			attrEl.innerText = '— ' + author;

			// Shrink both elements proportionally until the box fits
			let textSize = parseFloat(getComputedStyle(textEl).fontSize);
			const ratio = parseFloat(getComputedStyle(attrEl).fontSize) / textSize;
			while (display.scrollHeight > display.clientHeight && textSize > 8) {
				textSize -= 0.5;
				textEl.style.fontSize = textSize + 'px';
				attrEl.style.fontSize = (textSize * ratio) + 'px';
			}
		}

		function refreshContent() {

			if (intervalID){
				clearInterval(intervalID);
			}
			if (refreshTimeoutID) {
				clearTimeout(refreshTimeoutID);
			}
			const container = document.getElementById('artwork-container');

			const fadeDuration = parseFloat(
				getComputedStyle(document.documentElement).getPropertyValue('--fade-duration')
			) * 1000;

			container.classList.add('hidden');

			const showQuote = Math.random() < 0.5;

			if (showQuote) {
				const randomQuote = ranQuote();
				refreshTimeoutID = setTimeout(() => {
					applyQuote(randomQuote);
					startInterval();
				}, fadeDuration);
			} else {
				const randomArtwork = ranImage();
				const newImage = new Image();
				refreshTimeoutID = setTimeout(() => {
					newImage.onload = function() {
						applyArtwork(randomArtwork);
						startInterval();
					};
					newImage.onerror = function() {
						applyQuote(ranQuote());
						startInterval();
					};
					newImage.src = randomArtwork.url;
				}, fadeDuration);
			}

			
		}

		function startInterval(){
			if (intervalID){
				clearInterval(intervalID);
			}
			intervalID = setInterval(() => {
				refreshContent();
			}, 20000);

			const fill = document.getElementById('progress-bar-fill');
			if (fill) {
				fill.style.animation = 'none';
				fill.offsetHeight; // trigger reflow to restart animation
				fill.style.animation = 'progress-drain 20s linear forwards';
			}
		}


		document.addEventListener('DOMContentLoaded', () => {

			const hashId = window.location.hash.slice(1);
			const hashImage = hashId && images.find(img => img.id === hashId);
			const hashQuote = !hashImage && hashId && quotes.find(q => q.id === hashId);

			if (hashImage) {
				imageBag.take(hashImage);
				applyArtwork(hashImage);
			} else if (hashQuote) {
				quoteBag.take(hashQuote);
				applyQuote(hashQuote);
			} else if (Math.random() < 0.5) {
				applyQuote(ranQuote());
			} else {
				applyArtwork(ranImage());
			}

			// when the artwork or quote is clicked, cycle to the next one
			function onContentClick(event) {
				event.preventDefault();
				refreshContent();
			}
			document.getElementById('artwork').addEventListener('click', onContentClick);
			document.getElementById('quote-display').addEventListener('click', onContentClick);

			// share: copy current URL to clipboard and show notification
			let copyNotifTimeoutID = 0;
			function showCopyNotification() {
				const notif = document.getElementById('copy-notification');
				notif.classList.add('visible');
				clearTimeout(copyNotifTimeoutID);
				copyNotifTimeoutID = setTimeout(() => notif.classList.remove('visible'), 2000);
			}
			function copyCurrentLink(event) {
				event.stopPropagation();
				navigator.clipboard.writeText(window.location.href).then(showCopyNotification);
			}
			document.getElementById('artwork-share-btn').addEventListener('click', copyCurrentLink);
			document.getElementById('quote-share-btn').addEventListener('click', copyCurrentLink);

			// slideshow toggle — persisted to localStorage
			const slideshowToggle = document.getElementById('slideshowToggle');
			slideshowToggle.checked = localStorage.getItem('slideshow') !== 'off';
			if (slideshowToggle.checked) startInterval();
			slideshowToggle.addEventListener('change', () => {
				localStorage.setItem('slideshow', slideshowToggle.checked ? 'on' : 'off');
				if (slideshowToggle.checked) {
					startInterval();
				} else {
					clearInterval(intervalID);
					intervalID = 0;
					clearTimeout(refreshTimeoutID);
					refreshTimeoutID = 0;
					const fill = document.getElementById('progress-bar-fill');
					if (fill) {
						fill.style.animation = 'none';
						fill.style.transform = 'scaleX(0)';
					}
				}
			});

			let resizeDebounceID = 0;
			window.addEventListener('resize', () => {
				clearTimeout(resizeDebounceID);
				resizeDebounceID = setTimeout(() => {
					if (currentQuote) applyQuote(currentQuote);
				}, 150);
			});

			const settingsButton = document.getElementById('settingsButton');
			const settingsMenu = document.getElementById('settingsMenu');
			const darkModeToggle = document.getElementById('darkModeToggle');
			
			// Check system preference
			const prefersDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
			
			
			// Toggle settings menu
			settingsButton.addEventListener('click', () => {
				settingsMenu.classList.toggle('hidden');
			});
			
			// Close settings menu when clicking outside
			document.addEventListener('click', (event) => {
				if (!settingsButton.contains(event.target) && !settingsMenu.contains(event.target)) {
					settingsMenu.classList.add('hidden');
				}
			});
						
			// Sync toggle state with the theme already applied in <head>
			const savedTheme = localStorage.getItem('theme');
			darkModeToggle.checked = savedTheme ? savedTheme === 'dark' : prefersDarkMode;
			// Handle dark mode toggle
			darkModeToggle.addEventListener('change', () => {
				const newTheme = darkModeToggle.checked ? 'dark' : 'light';
				document.documentElement.setAttribute('data-theme', newTheme);
				localStorage.setItem('theme', newTheme);
			});
			
			// Listen for system theme changes
			window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
				if (!localStorage.getItem('theme')) {
					const newTheme = e.matches ? 'dark' : 'light';
					document.documentElement.setAttribute('data-theme', newTheme);
					darkModeToggle.checked = e.matches;
				}
			});
		}); 
	</script>

</body>

</html>
