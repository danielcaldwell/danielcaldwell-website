<!DOCTYPE html>
<html lang="en">

<head>
	<title>Daniel Caldwell's Website</title>
	
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- favicon-->
	<link rel="icon" href="favicon.ico" type="image/x-icon">

	<!-- styles -->
	<link href="site.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<script>
		const savedTheme = localStorage.getItem('theme');
		if (savedTheme) {
			document.documentElement.setAttribute('data-theme', savedTheme);
		} else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
			document.documentElement.setAttribute('data-theme', 'dark');
		}
	</script>

</head>

<body>

	<script type="text/javascript" src="imagelist.js"></script>
	<script type="text/javascript" src="quotelist.js"></script>

    <div class="container">


		<div class="settings-bar">
			<button id="settingsButton" class="settings-button">
				<i class="fas fa-bars"></i>
			</button>
			<div id="settingsMenu" class="settings-menu hidden">
				<div class="settings-option">
					<label for="darkModeToggle">Dark Mode</label>
					<label class="switch">
						<input type="checkbox" id="darkModeToggle">
						<span class="slider round"></span>
					</label>
				</div>
				<hr class="settings-divider">
				<div class="settings-option">
					<a href="images.html">All Images</a>
				</div>
				<div class="settings-option">
					<a href="quotes.html">All Quotes</a>
				</div>
			</div>
		</div>

		<div id="artwork-container" class="artwork-container hidden">
			<div class="artwork-image-group">
				<img alt="" id="artwork" class="artwork-display">
				<div class="artwork-label">
					<div id="artwork-title" class="artwork-title"></div>
					<div id="artwork-date" class="artwork-date"></div>
					<div id="artwork-author" class="artwork-author"></div>
					<div id="artwork-medium" class="artwork-medium"></div>
					<div id="artwork-description" class="artwork-description"></div>
				</div>
			</div>
			<div id="quote-display" class="quote-display">
				<div id="quote-text" class="quote-text"></div>
				<div id="quote-attribution" class="quote-attribution"></div>
			</div>
		</div>


	</div>


	<script>

		// This code was created by me, Daniel Caldwell, and it is availiable to the public domain.

		var intervalID = 0;
		var refreshTimeoutID = 0;
		let currentQuote = null;

		function ranImage() {

			var ranNum = Math.floor(Math.random() * images.length);
			return (images[ranNum]);
		}


		function ranQuote() {
			var ranNum = Math.floor(Math.random() * quotes.length);
			return (quotes[ranNum]);
		}

		function applyArtwork(artwork) {
			currentQuote = null;
			const container = document.getElementById('artwork-container');
			container.classList.remove('showing-quote');
			container.classList.remove('hidden');
			history.replaceState(null, '', '#' + artwork.id);
			document.getElementById('artwork').src = artwork.url;
			document.getElementById('artwork').alt = artwork.title;
			document.getElementById('artwork-title').innerText = artwork.title;
			document.getElementById('artwork-author').innerText = artwork.author;
			document.getElementById('artwork-medium').innerText = artwork.medium;

			const dateElement = document.getElementById('artwork-date');
			dateElement.innerText = artwork.date || '';
			dateElement.style.display = artwork.date ? '' : 'none';

			const descElement = document.getElementById('artwork-description');
			descElement.innerText = artwork.description || '';
			descElement.style.display = artwork.description ? '' : 'none';
		}

		function applyQuote(quote) {
			currentQuote = quote;
			const container = document.getElementById('artwork-container');
			container.classList.add('showing-quote');
			container.classList.remove('hidden');
			history.replaceState(null, '', '#' + quote.id);
			let quoteText = '”' + quote.quote + '”';
			let author = quote.author;
			const dashIdx = author.indexOf(' - ');
			if (dashIdx !== -1) {
				quoteText += ' (' + author.slice(dashIdx + 3) + ')';
				author = author.slice(0, dashIdx);
			}
			const textEl = document.getElementById('quote-text');
			const attrEl = document.getElementById('quote-attribution');
			const display = document.getElementById('quote-display');

			// Reset any inline sizes from the previous quote
			textEl.style.fontSize = '';
			attrEl.style.fontSize = '';

			textEl.innerText = quoteText;
			attrEl.innerText = '— ' + author;

			// Shrink both elements proportionally until the box fits
			let textSize = parseFloat(getComputedStyle(textEl).fontSize);
			const ratio = parseFloat(getComputedStyle(attrEl).fontSize) / textSize;
			while (display.scrollHeight > display.clientHeight && textSize > 8) {
				textSize -= 0.5;
				textEl.style.fontSize = textSize + 'px';
				attrEl.style.fontSize = (textSize * ratio) + 'px';
			}
		}

		function refreshContent() {

			if (intervalID){
				clearInterval(intervalID);
			}
			if (refreshTimeoutID) {
				clearTimeout(refreshTimeoutID);
			}
			const container = document.getElementById('artwork-container');

    		const fadeDuration = 1000; // must match .artwork-container transition duration in site.css

			container.classList.add('hidden');

			const showQuote = Math.random() < 0.5;

			if (showQuote) {
				const randomQuote = ranQuote();
				refreshTimeoutID = setTimeout(() => {
					applyQuote(randomQuote);
					container.classList.remove('hidden');
					startInterval();
				}, fadeDuration);
			} else {
				const randomArtwork = ranImage();
				const newImage = new Image();
				refreshTimeoutID = setTimeout(() => {
					newImage.onload = function() {
						applyArtwork(randomArtwork);
						container.classList.remove('hidden');
						startInterval();
					};
					newImage.onerror = function() {
						applyQuote(ranQuote());
						startInterval();
					};
					newImage.src = randomArtwork.url;
				}, fadeDuration);
			}

			
		}

		function startInterval(){
			// reset interval
			if (intervalID){ 
				clearInterval(intervalID);
			}
			intervalID = setInterval(() => {
				refreshContent();
			}, 20000);

		}


		document.addEventListener('DOMContentLoaded', () => {

			startInterval();

			const hashId = window.location.hash.slice(1);
			const hashImage = hashId && images.find(img => img.id === hashId);
			const hashQuote = !hashImage && hashId && quotes.find(q => q.id === hashId);

			if (hashImage) {
				applyArtwork(hashImage);
			} else if (hashQuote) {
				applyQuote(hashQuote);
			} else if (Math.random() < 0.5) {
				applyQuote(ranQuote());
			} else {
				applyArtwork(ranImage());
			}


			// when the artwork or quote is clicked, cycle to the next one
			function onContentClick(event) {
				event.preventDefault();
				refreshContent();
			}
			document.getElementById('artwork').addEventListener('click', onContentClick);
			document.getElementById('quote-display').addEventListener('click', onContentClick);

			let resizeDebounceID = 0;
			window.addEventListener('resize', () => {
				clearTimeout(resizeDebounceID);
				resizeDebounceID = setTimeout(() => {
					if (currentQuote) applyQuote(currentQuote);
				}, 150);
			});

			const settingsButton = document.getElementById('settingsButton');
			const settingsMenu = document.getElementById('settingsMenu');
			const darkModeToggle = document.getElementById('darkModeToggle');
			
			// Check system preference
			const prefersDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
			
			
			// Toggle settings menu
			settingsButton.addEventListener('click', () => {
				settingsMenu.classList.toggle('hidden');
			});
			
			// Close settings menu when clicking outside
			document.addEventListener('click', (event) => {
				if (!settingsButton.contains(event.target) && !settingsMenu.contains(event.target)) {
					settingsMenu.classList.add('hidden');
				}
			});
						
			// Sync toggle state with the theme already applied in <head>
			const savedTheme = localStorage.getItem('theme');
			darkModeToggle.checked = savedTheme ? savedTheme === 'dark' : prefersDarkMode;
			// Handle dark mode toggle
			darkModeToggle.addEventListener('change', () => {
				const newTheme = darkModeToggle.checked ? 'dark' : 'light';
				document.documentElement.setAttribute('data-theme', newTheme);
				localStorage.setItem('theme', newTheme);
			});
			
			// Listen for system theme changes
			window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
				if (!localStorage.getItem('theme')) {
					const newTheme = e.matches ? 'dark' : 'light';
					document.documentElement.setAttribute('data-theme', newTheme);
					darkModeToggle.checked = e.matches;
				}
			});
		}); 
	</script>

</body>

</html>
