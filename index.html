<!DOCTYPE html>
<HTML lang="en">

<HEAD>
	<TITLE>Daniel Caldwell's Website</TITLE>
	
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

	<!-- favicon-->
	<link rel="icon" href="favicon.ico" type="image/x-icon">

	<!-- styles -->
	<link href="site.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<script>
		const savedTheme = localStorage.getItem('theme');
		if (savedTheme) {
			document.documentElement.setAttribute('data-theme', savedTheme);
		} else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
			document.documentElement.setAttribute('data-theme', 'dark');
		}
	</script>

</HEAD>

<BODY>

	<script type="text/javascript" src="imagelist.js"></script>
	<script type="text/javascript" src="quotelist.js"></script>

    <div class="container">


		<div class="settings-bar">
			<button id="settingsButton" class="settings-button">
				<i class="fas fa-bars"></i>
			</button>
			<div id="settingsMenu" class="settings-menu hidden">
				<div class="settings-option">
					<label for="darkModeToggle">Dark Mode</label>
					<label class="switch">
						<input type="checkbox" id="darkModeToggle">
						<span class="slider round"></span>
					</label>
				</div>
				<hr class="settings-divider">
				<div class="settings-option">
					<a href="images.html">All Images</a>
				</div>
				<div class="settings-option">
					<a href="quotes.html">All Quotes</a>
				</div>
			</div>
		</div>

		<div id="artwork-container" class="artwork-container">
			<img alt="Museum Artifact" id="artwork" class="artwork-display">
			<div id="quote-display" class="quote-display">
				<div id="quote-text" class="quote-text"></div>
				<div id="quote-attribution" class="quote-attribution"></div>
			</div>
			<div class="artwork-label">
				<div id="artwork-title" class="artwork-title">Bryce Canyon</div>
				<div id="artwork-date" class="artwork-date">2007</div>
				<div id="artwork-author" class="artwork-author">Daniel Caldwell</div>
				<div id="artwork-author-lifetime" class="artwork-author-lifetime">American (19??-????)</div>
				<div id="artwork-medium" class="artwork-medium">Stitched Panoramic Photo on Digital Screen</div>
				<div id="artwork-description" class="artwork-description">A panoramic view of Bryce Canyon from Sunrise Point.</div>
			</div>
		</div>


	</div>


	<script>

		// This code was created by me, Daniel Caldwell, and it is availiable to the public domain.

		var intervalID = 0;
		var refreshTimeoutID = 0;

		function ranImage() {

			var ranNum = Math.floor(Math.random() * images.length);
			return (images[ranNum]);
		}


		function ranQuote() {
			var ranNum = Math.floor(Math.random() * quotes.length);
			return (quotes[ranNum]);
		}

		function applyArtwork(artwork) {
			document.getElementById('artwork-container').classList.remove('showing-quote');
			document.getElementById('artwork').src = artwork.url;
			document.getElementById('artwork').alt = artwork.title;
			document.getElementById('artwork-title').innerText = artwork.title;
			document.getElementById('artwork-date').innerText = artwork.date;
			document.getElementById('artwork-author').innerText = artwork.author;
			document.getElementById('artwork-author-lifetime').innerText = artwork.author_lifetime;
			document.getElementById('artwork-medium').innerText = artwork.medium;
			document.getElementById('artwork-description').innerText = artwork.description;
		}

		function applyQuote(quote) {
			document.getElementById('artwork-container').classList.add('showing-quote');
			let quoteText = '”' + quote.quote + '”';
			let author = quote.author;
			const dashIdx = author.indexOf(' - ');
			if (dashIdx !== -1) {
				quoteText += ' (' + author.slice(dashIdx + 3) + ')';
				author = author.slice(0, dashIdx);
			}
			document.getElementById('quote-text').innerText = quoteText;
			document.getElementById('quote-attribution').innerText = '— ' + author;
		}

		function refreshContent() {

			if (intervalID){
				clearInterval(intervalID);
			}
			if (refreshTimeoutID) {
				clearTimeout(refreshTimeoutID);
			}
			const container = document.getElementById('artwork-container');

    		const fadeDuration = 1000; // must match .artwork-container transition duration in site.css

			container.classList.add('hidden');

			const showQuote = Math.random() < 0.5;

			if (showQuote) {
				const randomQuote = ranQuote();
				refreshTimeoutID = setTimeout(() => {
					applyQuote(randomQuote);
					container.classList.remove('hidden');
					startInterval();
				}, fadeDuration);
			} else {
				const randomArtwork = ranImage();
				const newImage = new Image();
				refreshTimeoutID = setTimeout(() => {
					newImage.onload = function() {
						applyArtwork(randomArtwork);
						container.classList.remove('hidden');
						startInterval();
					};
					newImage.onerror = function() {
						// If the image fails, don't leave the container hidden.
						container.classList.remove('hidden');
						startInterval();
					};
					newImage.src = randomArtwork.url;
				}, fadeDuration);
			}

			
		}

		function startInterval(){
			// reset interval
			if (intervalID){ 
				clearInterval(intervalID);
			}
			intervalID = setInterval(() => {
				refreshContent();
			}, 20000);

		}


		document.addEventListener('DOMContentLoaded', () => {

			startInterval();

			if (Math.random() < 0.5) {
				applyQuote(ranQuote());
			} else {
				applyArtwork(ranImage());
			}


			// when the artwork or quote is clicked, cycle to the next one
			function onContentClick(event) {
				event.preventDefault();
				refreshContent();
			}
			document.getElementById('artwork').addEventListener('click', onContentClick);
			document.getElementById('quote-display').addEventListener('click', onContentClick);


			const settingsButton = document.getElementById('settingsButton');
			const settingsMenu = document.getElementById('settingsMenu');
			const darkModeToggle = document.getElementById('darkModeToggle');
			
			// Check system preference
			const prefersDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
			
			
			// Toggle settings menu
			settingsButton.addEventListener('click', () => {
				settingsMenu.classList.toggle('hidden');
			});
			
			// Close settings menu when clicking outside
			document.addEventListener('click', (event) => {
				if (!settingsButton.contains(event.target) && !settingsMenu.contains(event.target)) {
					settingsMenu.classList.add('hidden');
				}
			});
						
			// Check for saved user preference
			const savedTheme = localStorage.getItem('theme');
			
			// Set initial theme
			if (savedTheme) {
				document.documentElement.setAttribute('data-theme', savedTheme);
				darkModeToggle.checked = savedTheme === 'dark';
			} else {
				document.documentElement.setAttribute('data-theme', prefersDarkMode ? 'dark' : 'light');
				darkModeToggle.checked = prefersDarkMode;
			}
			// Handle dark mode toggle
			darkModeToggle.addEventListener('change', () => {
				const newTheme = darkModeToggle.checked ? 'dark' : 'light';
				document.documentElement.setAttribute('data-theme', newTheme);
				localStorage.setItem('theme', newTheme);
			});
			
			// Listen for system theme changes
			window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
				if (!localStorage.getItem('theme')) {
					const newTheme = e.matches ? 'dark' : 'light';
					document.documentElement.setAttribute('data-theme', newTheme);
					darkModeToggle.checked = e.matches;
				}
			});
		}); 
	</script>

</BODY>

</HTML>
